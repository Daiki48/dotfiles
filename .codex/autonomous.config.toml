# 自律モード（profile v2 / 端末非依存・dotfiles 管理）
# 起動: codex --profile autonomous
# 危険コマンド以外は自動。ワークスペース内の編集・コマンドは確認なしで実行する。
# Git 書き込み系の禁止は hook（block_git_write.py / approval 非依存で常時有効）、
# rm/mv 等の確認は ~/.codex/rules/default.rules（対話時の approval で評価）で制御。
model = "gpt-5.5"
model_reasoning_effort = "high"
approval_policy = "on-request"
sandbox_mode = "workspace-write"
plan_mode_reasoning_effort = "high"

[sandbox_workspace_write]
network_access = true

# project trust ([projects.*]) は端末依存なので、このテンプレートには置かない。
# Codex が追記した trust は local ~/.codex/autonomous.config.toml 側で管理する。
